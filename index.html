<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazsikaa3 Portfólió</title>
    <style>
        /* Ez itt a CSS rész */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; /* Mélykék háttér */
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .profile-card {
            background: #1e293b;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #334155;
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-10px); /* Kicsit megemelkedik, ha rátartod az egeret */
        }

        h1 {
            color: #38bdf8; /* Világoskék cím */
            margin-bottom: 0.5rem;
        }

        p {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 10px 25px;
            background-color: #38bdf8;
            color: #0f172a;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #7dd3fc;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <h1>Bazsikaa3</h1>
        <p>Junior Fejlesztő & GitHub Mágus</p>
        <p>Ez az első profi CSS designom!</p>
        <a href="https://github.com/Bazsikaa3" class="btn">GitHub Profilom</a>
    </div>

</body>
</html>
